<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Malaga airport transfer meet and greet</title>
  <desc id="desc">Stylized illustration of Malaga airport terminal, a driver portrait, and premium transfer vehicles.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2e7d0" />
      <stop offset="58%" stop-color="#e5c596" />
      <stop offset="100%" stop-color="#cd8a4d" />
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b35a2f" />
      <stop offset="100%" stop-color="#e07b3b" />
    </linearGradient>
    <linearGradient id="apron" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7efe2" />
      <stop offset="100%" stop-color="#d2b184" />
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#sky)" />
  <rect y="530" width="1200" height="270" fill="url(#ground)" />
  <ellipse cx="780" cy="600" rx="400" ry="70" fill="#8c4b2f" opacity=".35" />

