    <rect x="34" y="150" width="632" height="34" rx="10" fill="#6d4326" />
    <text x="66" y="173" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#f9e4c0">ARRIVALS " MEET &amp; GREET " TRANSFERS</text>
  </g>

  <g transform="translate(60 180)">
